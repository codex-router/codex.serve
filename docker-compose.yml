services:
  codex-serve:
    image: craftslab/codex-serve:latest
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the docker socket to allow spawning sibling containers
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Tell codex.serve to use the agent docker image
      - CODEX_AGENT_IMAGE=craftslab/codex-agent:latest
      # Tell codex.serve to use the insight docker image
      - CODEX_INSIGHT_IMAGE=craftslab/codex-insight:latest
      # Supported agent providers (comma-separated)
      - AGENT_LIST=codex,opencode,qwen
      # Supported model IDs (comma-separated)
      - AGENT_MODEL=ollama-kimi-k2.5,ollama-minimax-m2.5,ollama-qwen3-coder
      - INSIGHT_MODEL=ollama-gemini-3-flash-preview
      - CODEX_GRAPH_IMAGE=${CODEX_GRAPH_IMAGE:-craftslab/codex-graph:latest}
      - GRAPH_MODEL=${GRAPH_MODEL:-}
      # codex.graph backend endpoint for /graph/run proxy
      - GRAPH_BASE_URL=${GRAPH_BASE_URL:-http://host.docker.internal:52104}
      # Enable automatic codex.graph docker compose bootstrap when /graph/run is called
      - GRAPH_AUTO_START=${GRAPH_AUTO_START:-true}
      # optional fixed container name used for codex.graph auto-start
      - GRAPH_CONTAINER_NAME=${GRAPH_CONTAINER_NAME:-codex-graph-backend}
      # max wait time for codex.graph health readiness after startup
      - GRAPH_HEALTH_CHECK_TIMEOUT_SECONDS=${GRAPH_HEALTH_CHECK_TIMEOUT_SECONDS:-60}
      # /graph/run response timeout in seconds (0 or empty disables timeout)
      - GRAPH_RESPONSE_TIMEOUT_SECONDS=${GRAPH_RESPONSE_TIMEOUT_SECONDS:-1200}
      # LiteLLM endpoint and credentials
      - LITELLM_BASE_URL=${LITELLM_BASE_URL}
      - LITELLM_API_KEY=${LITELLM_API_KEY}
      - LITELLM_SSL_VERIFY=${LITELLM_SSL_VERIFY:-false}
      - LITELLM_CA_BUNDLE=${LITELLM_CA_BUNDLE:-}
      # /run response timeout in seconds (0 or empty disables timeout)
      - RUN_RESPONSE_TIMEOUT_SECONDS=${RUN_RESPONSE_TIMEOUT_SECONDS:-300}
      # /insight/run response timeout in seconds (0 or empty disables timeout)
      - INSIGHT_RESPONSE_TIMEOUT_SECONDS=${INSIGHT_RESPONSE_TIMEOUT_SECONDS:-1200}
